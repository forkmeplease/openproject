@if (removable) {
  <button
    class="spot-filter-chip--remove"
    type="button"
    (click)="remove.emit()"
    [attr.aria-label]="text.remove"
    [disabled]="disabled"
    >
    <svg x-icon size="small" />
  </button>
}
<div class="spot-filter-chip--title">
  @if (icon) {
    <span
      [ngClass]="iconClasses"
    ></span>
  }
  {{ title }}
</div>
