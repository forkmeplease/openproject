        heading: Nessuna sincronizzazione di dipartimenti LDAP
      destroy:
        confirmation: Se continui, la sincronizzazione %{name} verrà rimossa e i relativi %{departments_count} dipartimenti non saranno più gestiti da LDAP.
        heading: Rimuovere la sincronizzazione %{name}?
        info: I dipartimenti e i relativi membri verranno mantenuti e diventeranno dipartimenti normali. Successivamente potrai modificarli o eliminarli manualmente in Amministrazione → Utenti e autorizzazioni → Organizzazione.
        title: Rimuovi la sincronizzazione di %{name}
      form:
        auth_source_text: Seleziona quale connessione LDAP deve essere utilizzata.
        base_dn_text: 'Inserisci il DN di base le cui unità organizzative devono essere sincronizzate. Le relative unità organizzative figlie dirette diventeranno dipartimenti di primo livello. Deve essere contenuto nel DN di base della connessione LDAP selezionata.

          '
        guid_attribute_text: 'Facoltativo. L''attributo LDAP che contiene un identificatore univoco stabile (ad esempio "objectGUID" o "entryUUID"). Se impostato, i dipartimenti continueranno a essere riconosciuti anche in caso di rinomina o spostamento delle unità organizzative. Lascia vuoto per effettuare la corrispondenza in base al DN.

          '
        ou_name_attribute_text: L'attributo LDAP utilizzato per assegnare il nome al dipartimento (ad esempio "ou").
        sections:
          connection: Connessione LDAP
          structure: Unità organizzative
          users: Utenti
        structure_filter_string_text: Filtro LDAP RFC4515 che identifica le voci delle unità organizzative.
        sync_users_text: 'Se abilitata, gli utenti trovati al di sotto del DN di base vengono creati anche in OpenProject. In caso contrario, ai dipartimenti verranno assegnati solo gli account già esistenti.

          '
        user_filter_string_text: 'Facoltativo. Filtro LDAP RFC4515 che identifica le voci degli utenti. Lascialo vuoto per utilizzare il filtro della connessione oppure, se non è impostato alcun filtro, un filtro generico per le persone.

          '
      help_text: 'Questo modulo rispecchia la struttura delle unità organizzative (OU) della directory LDAP nella gerarchia dei dipartimenti di OpenProject. Ogni OU al di sotto del DN di base configurato diventa un dipartimento e gli utenti vengono assegnati al dipartimento corrispondente all''OU in cui si trovano. I dipartimenti vengono sincronizzati regolarmente tramite un processo cron.

        '
      no_results: Non è ancora stata configurata alcuna sincronizzazione dei dipartimenti LDAP.
