  ldap_departments:
    label_menu_item: Synchronisation du service LDAP
    label_synchronize: Synchroniser les unités organisationnelles
    synchronized_departments:
      blankslate:
        description: Lancez la synchronisation pour importer les unités organisationnelles de ce DN de base en tant que services.
        heading: Aucun service n'a encore été synchronisé
      destroy:
        confirmation: Si vous continuez, %{name} ne sera plus géré par la synchronisation LDAP.
        heading: Arrêter la gestion de %{name} ?
        info: Le service et ses membres sont conservés. Il devient un service standard que vous pouvez modifier ou supprimer manuellement.
