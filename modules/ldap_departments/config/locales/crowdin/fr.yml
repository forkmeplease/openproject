    synchronized_trees:
      add_new: Ajouter une synchronisation de service LDAP
      synchronization_started: La synchronisation a démarré en arrière-plan. Les services s'afficheront une fois celle-ci terminée.
      blankslate:
        description: Configurez une synchronisation afin de reproduire la structure des unités organisationnelles LDAP dans la hiérarchie des services d'OpenProject.
        heading: Aucune synchronisation LDAP entre les services
      destroy:
        confirmation: Si vous continuez, la synchronisation %{name} sera supprimée et ses %{departments_count} services ne seront plus gérés par LDAP.
        heading: Supprimer la synchronisation %{name} ?
        info: Les services et leurs membres sont conservés et deviennent des services permanents. Vous pouvez ensuite les modifier ou les supprimer manuellement dans la rubrique Administration → Utilisateurs et autorisations → Organisation.
        title: Supprimer la synchronisation %{name}
      form:
        auth_source_text: Sélectionnez la connexion LDAP à utiliser.
        base_dn_text: 'Saisissez le DN de base dont les unités organisationnelles doivent être synchronisées. Ses unités organisationnelles enfants directes deviendront des services de premier niveau. Il doit se trouver en dessous du DN de base de la connexion LDAP sélectionnée.

          '
        guid_attribute_text: 'Facultatif. L''attribut LDAP contenant un identifiant unique et stable (par exemple « objectGUID » ou « entryUUID »). Lorsqu''il est défini, les services conservent leur identité même en cas de changement de nom ou de déplacement de l''unité organisationnelle (OU). Laissez ce champ vide pour effectuer la correspondance par DN.

          '
        ou_name_attribute_text: L'attribut LDAP utilisé pour désigner le service (par exemple « ou »).
        sections:
          connection: Connexion LDAP
          structure: Unités organisationnelles
          users: Utilisateurs
        structure_filter_string_text: Filtre LDAP RFC 4515 permettant d'identifier les entrées d'unités organisationnelles.
        sync_users_text: 'Si cette option est activée, les utilisateurs situés sous le DN de base sont également créés dans OpenProject. Sans cette option, seuls les comptes existants sont affectés aux services.

          '
        user_filter_string_text: 'Filtre LDAP RFC4515 facultatif permettant d''identifier les entrées utilisateur. Laissez ce champ vide pour utiliser le filtre de connexion ou un filtre de personne générique si aucun filtre n''est défini.

          '
      help_text: 'Ce module reproduit la structure des unités organisationnelles (OU) de votre annuaire LDAP dans la hiérarchie des services d''OpenProject. Chaque OU située sous le DN de base configuré devient un service, et les utilisateurs sont affectés au service correspondant à l''OU dont ils font partie. Les services sont synchronisés régulièrement via une tâche cron.

        '
      no_results: Aucune synchronisation LDAP avec les services n'a encore été configurée.
      plural: Synchronisation des services LDAP
      singular: Synchronisation du service LDAP
  plugin_openproject_ldap_departments:
    description: Synchronisation des unités organisationnelles LDAP avec les services d'OpenProject.
