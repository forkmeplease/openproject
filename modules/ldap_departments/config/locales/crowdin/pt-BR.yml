    synchronized_trees:
      add_new: Adicionar sincronização de departamento LDAP
      synchronization_started: A sincronização foi iniciada em segundo plano. Os departamentos aparecerão assim que o processo for concluído.
      blankslate:
        description: Configure uma sincronização para espelhar a estrutura das unidades organizacionais do LDAP na hierarquia de departamentos do OpenProject.
        heading: Nenhuma sincronização de departamento LDAP
      destroy:
        confirmation: Se você continuar, a sincronização %{name} será removida e seus %{departments_count} departamentos não serão mais gerenciados pelo LDAP.
        heading: Remover sincronização %{name}?
        info: Os departamentos e seus membros são mantidos e passam a ser departamentos regulares. Depois disso, você pode editá-los ou excluí-los manualmente em Administração → Usuários e permissões → Organização.
        title: Remover sincronização %{name}
      form:
        auth_source_text: Selecione a conexão LDAP a ser usada.
        base_dn_text: 'Informe o DN base cujas unidades organizacionais devem ser sincronizadas. As OUs filhas diretas serão transformadas em departamentos de nível superior. Ele deve estar abaixo do DN base da conexão LDAP selecionada.

          '
        guid_attribute_text: 'Opcional. Atributo LDAP que contém um identificador único estável (por exemplo, “objectGUID” ou “entryUUID”). Quando definido, os departamentos permanecem consistentes mesmo que as OUs sejam renomeadas ou movidas. Deixe em branco para usar o DN como base de correspondência.

          '
        ou_name_attribute_text: Atributo LDAP usado para definir o nome do departamento (por exemplo, “ou”).
        sections:
          connection: Conexão LDAP
          structure: Unidades organizacionais
          users: Usuários
        structure_filter_string_text: Filtro LDAP no formato RFC4515 que identifica entradas de unidade organizacional.
        sync_users_text: 'Se habilitado, os usuários encontrados abaixo do DN base também serão criados no OpenProject. Caso contrário, apenas contas já existentes serão atribuídas aos departamentos.

          '
        user_filter_string_text: 'Opcional. Filtro LDAP no formato RFC4515 que identifica entradas de usuários. Deixe em branco para usar o filtro da conexão ou um filtro genérico de pessoa, caso nenhum esteja definido.

          '
      help_text: 'Este módulo espelha a estrutura de unidades organizacionais (OU) do seu diretório LDAP na hierarquia de departamentos do OpenProject. Cada OU abaixo do DN base configurado torna-se um departamento, e os usuários são atribuídos ao departamento da OU em que estão. Os departamentos são sincronizados regularmente por meio de uma tarefa agendada (cron).

        '
      no_results: Ainda não há sincronizações de departamentos LDAP configuradas.
      plural: Sincronizações de departamento LDAP
      singular: Sincronização de departamento LDAP
  plugin_openproject_ldap_departments:
    description: Sincronização das unidades organizacionais do LDAP com os departamentos do OpenProject.
