    synchronized_departments:
      blankslate:
        description: Execute a sincronização para importar as unidades organizacionais deste DN base como departamentos.
        heading: Ainda não há departamentos sincronizados
      destroy:
        confirmation: Se você continuar, %{name} deixará de ser gerenciado pela sincronização LDAP.
        heading: Parar de gerenciar %{name}?
