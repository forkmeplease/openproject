          '
        guid_attribute_text: 'Необов’язково. Атрибут LDAP, що містить стабільний унікальний ідентифікатор (наприклад, «objectGUID» або «entryUUID»). Якщо його вказати, відділи зберігатимуться навіть після перейменування або переміщення організаційних одиниць. Залиште поле порожнім, щоб використовувати DN для зіставлення.

          '
        ou_name_attribute_text: Атрибут LDAP, який використовується для позначення відділу (наприклад, «ou»).
