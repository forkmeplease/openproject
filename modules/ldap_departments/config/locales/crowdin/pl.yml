        info: Działy zostają zachowane wraz z członkami i stają się zwykłymi działami. Można je później ręcznie edytować lub usunąć w sekcji Administracja → Użytkownicy i uprawnienia → Organizacja.
        title: Usuń synchronizację %{name}
      form:
        auth_source_text: Wybierz połączenie LDAP, którego chcesz użyć.
        base_dn_text: 'Wprowadź bazową nazwę DN, której jednostki organizacyjne mają być synchronizowane. Jej bezpośrednie jednostki podrzędne staną się działami najwyższego poziomu. Musi znajdować się poniżej bazowej nazwy DN wybranego połączenia LDAP.

          '
        guid_attribute_text: 'Opcjonalne. Atrybut LDAP zawierający stabilny unikalny identyfikator (np. „objectGUID” lub „entryUUID”). Po ustawieniu tej opcji działy zachowują swoje dane nawet w przypadku zmiany nazwy i przeniesienia jednostki organizacyjnej. Pozostaw to pole puste, aby dopasowywać na podstawie nazwy wyróżniającej.

          '
        ou_name_attribute_text: Atrybut LDAP służący do określenia nazwy działu (np. „ou”).
        sections:
          connection: Połączenie LDAP
          structure: Jednostki organizacyjne
          users: Użytkownicy
        structure_filter_string_text: Filtr LDAP zgodny z RFC 4515, służący do identyfikacji wpisów jednostek organizacyjnych.
        sync_users_text: 'Jeśli opcja ta jest włączona, użytkownicy znajdujący się poniżej bazowej nazwy DN są tworzeni również w OpenProject. W przeciwnym razie do działów przypisywane są jedynie istniejące konta.

          '
        user_filter_string_text: 'Opcjonalny filtr LDAP zgodny z RFC 4515, służący do identyfikacji wpisów użytkowników. Pozostaw to pole puste, aby zastosować filtr połączenia lub ogólny filtr osób, jeśli nie określono żadnego filtru.

          '
      help_text: 'Ten moduł odzwierciedla strukturę jednostki organizacyjnej (OU) katalogu LDAP w hierarchii działów OpenProject. Każda OU poniżej skonfigurowanej bazowej DN staje się działem, a użytkownicy są przypisywani do działu OU, w którym się znajdują. Działy są regularnie synchronizowane przez zadanie cron.

        '
      no_results: Nie skonfigurowano jeszcze żadnych synchronizacji LDAP działów.
