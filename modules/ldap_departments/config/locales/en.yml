    label_menu_item: 'LDAP department synchronization'
    label_n_departments_found:
      one: "1 department synchronized"
      other: "%{count} departments synchronized"
      zero: "No departments were synchronized"
    label_synchronize: 'Synchronize organizational units'
    synchronized_departments:
      blankslate:
        description: 'Run the synchronization to import the organizational units of this base DN as departments.'
        heading: 'No departments synchronized yet'
      destroy:
        confirmation: "If you continue, the mapping for %{name} and the %{users_count} memberships synchronized through it will be removed."
        heading: 'Remove synchronized department %{name}?'
        info: "The department itself and members added outside this synchronization will not be removed."
        title: 'Remove synchronized department %{name}'
      managed_notice: 'Managed by LDAP synchronization'
      no_results: 'No departments have been synchronized yet.'
      plural: 'Synchronized departments'
      singular: 'Synchronized department'
    synchronized_trees:
      add_new: 'Add LDAP department synchronization'
      blankslate:
        description: 'Set up a synchronization to mirror your LDAP organizational unit structure into the OpenProject department hierarchy.'
        heading: 'No LDAP department synchronizations'
      destroy:
        confirmation: "If you continue, the synchronization %{name} and the mapping of all %{departments_count} departments created through it will be removed."
        heading: 'Remove synchronization %{name}?'
        info: "The departments themselves and members added outside this synchronization will not be removed."
        title: 'Remove synchronization %{name}'
        verification_html: "Enter the synchronization name %{name} to verify the deletion."
      form:
        auth_source_text: 'Select which LDAP connection should be used.'
        base_dn_text: >
          Enter the base DN whose organizational units should be synchronized. Its direct child OUs
          become top-level departments. It must be below the base DN of the selected LDAP connection.
        guid_attribute_text: >
          Optional. The LDAP attribute holding a stable unique identifier (e.g. "objectGUID" or
          "entryUUID"). When set, departments survive OU renames and moves. Leave empty to match by DN.
        ou_name_attribute_text: 'The LDAP attribute used to name the department (e.g. "ou").'
        sections:
          connection: 'LDAP connection'
          structure: 'Organizational units'
          users: 'Users'
        structure_filter_string_text: 'RFC4515 LDAP filter identifying organizational unit entries.'
        sync_users_text: >
          If enabled, users found below the base DN are also created in OpenProject. Without it, only
          existing accounts are assigned to departments.
        user_filter_string_text: >
          Optional RFC4515 LDAP filter identifying user entries. Leave empty to use the connection
          filter, or a generic person filter when none is set.
      help_text: >
        This module mirrors the organizational unit (OU) structure of your LDAP directory into the
        OpenProject department hierarchy. Each OU below the configured base DN becomes a department,
        and users are assigned to the department of the OU they reside in. Departments are
        synchronized regularly through a cron job.
      no_results: 'No LDAP department synchronizations configured yet.'
      plural: 'LDAP department synchronizations'
      singular: 'LDAP department synchronization'
  plugin_openproject_ldap_departments:
    description: "Synchronization of LDAP organizational units into OpenProject departments."
    name: "OpenProject LDAP departments"
