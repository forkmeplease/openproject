# Schema: MeetingModel
---
type: object
required:
  - title
properties:
  _type:
    type: string
    enum:
      - Meeting
  id:
    type: integer
    description: Identifier of this meeting
    minimum: 1
  title:
    type: string
    description: The meeting's title
  location:
    type: string
    description: The meeting's location
  lockVersion:
    type: integer
    description: The version of the item as used for optimistic locking
  startTime:
    type: string
    format: date-time
    description: The start time of the meeting
  endTime:
    type: string
    format: date-time
    description: The end time of the meeting
  duration:
    type: number
    description: The duration of the meeting in hours. The difference between `startTime` and `endTime`
  createdAt:
    type: string
    format: date-time
    description: Timestamp of the creation datetime of the meeting
  updatedAt:
    type: string
    format: date-time
    description: Timestamp of the last modification datetime of the meeting
  _links:
    type: object
    properties:
      self:
        allOf:
          - "$ref": "./link.yml"
          - description: |-
              This meeting
              
              **Resource**: Meeting
      author:
        allOf:
          - "$ref": "./link.yml"
          - description: |-
              The user having created the meeting
              
              **Resource**: User
      project:
        allOf:
          - "$ref": "./link.yml"
          - description: |-
              The project the meeting is in
              
              **Resource**: Project
      attachments:
        allOf:
          - $ref: './link.yml'
          - description: |-
              The attachment collection of this grid.
              
              **Resource**: AttachmentCollection           
      addAttachment:
        allOf:
          - "$ref": "./link.yml"
          - description: |-
              Attach a file to the meeting
              
              # Conditions
              
              **Permission**: edit meeting
